# Default deployment: GPU + whisperX on the scilifelab-2-dev A40 pool.
# Serves whisper.hypha.aicell.io behind an nginx ingress with a cluster-wide
# wildcard TLS secret. Single replica because the model-cache PVC is RWO;
# raise WHISPER_MAX_WORKERS instead of scaling out.

replicaCount: 1

image:
  repository: ghcr.io/oeway/whisper-web
  tag: "main-gpu"
  pullPolicy: Always

service:
  type: ClusterIP
  port: 8000
  # Override the app.kubernetes.io/instance label this Service selects on.
  # Defaults to the release name; used historically to point whisper-web's
  # Service at the whisper-web-gpu release's pods during migration.
  # selectorInstance: whisper-web-gpu

ingress:
  enabled: true
  className: nginx
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: 100m
    nginx.ingress.kubernetes.io/proxy-read-timeout: "360"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "360"
    nginx.ingress.kubernetes.io/affinity: "cookie"
    nginx.ingress.kubernetes.io/affinity-mode: "persistent"
    nginx.ingress.kubernetes.io/session-cookie-name: "whisper-sticky"
    nginx.ingress.kubernetes.io/session-cookie-max-age: "10800"
    nginx.ingress.kubernetes.io/session-cookie-samesite: "None"
    nginx.ingress.kubernetes.io/session-cookie-secure: "true"
    nginx.ingress.kubernetes.io/enable-cors: "true"
    nginx.ingress.kubernetes.io/cors-allow-origin: "*"
    nginx.ingress.kubernetes.io/cors-allow-methods: "GET, POST, PUT, DELETE, OPTIONS"
    nginx.ingress.kubernetes.io/cors-allow-headers: "DNT,X-CustomHeader,Keep-Alive,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Authorization"
  host: whisper.hypha.aicell.io
  # Cluster-wide wildcard from the kth-k8s TLS migration. The per-host
  # cert-manager Certificate is no longer used — do NOT re-add the
  # cert-manager.io/cluster-issuer annotation, it would recreate that
  # object and conflict with the wildcard.
  tls:
    secretName: hypha-aicell-io-wildcard-tls
  # Optional override to route this ingress at another release's Service.
  # backendService: whisper-web-gpu

env:
  WHISPER_BACKEND: "whisperx"
  WHISPER_MODEL_SIZE: "large-v3"
  WHISPER_DEVICE: "cuda"
  WHISPER_COMPUTE_TYPE: "float16"
  # whisperX is GPU-bound; two workers max out one A40 time-slice.
  WHISPER_MAX_WORKERS: "2"
  WHISPER_MAX_QUEUE: "32"
  WHISPER_INFERENCE_TIMEOUT: "120"
  WHISPERX_BATCH_SIZE: "8"
  UVICORN_WORKERS: "1"
  WHISPER_REQUIRE_AUTH: "true"
  HYPHA_TOKEN_URL: "https://hypha.aicell.io/public/services/ws/parse_token"

gpu:
  enabled: true
  resource: nvidia.com/gpu
  count: 1

# Reuse the PVC that whisper-web-gpu previously owned — its 20Gi already
# holds the large-v3 weights and the EN alignment model, so a fresh pod
# skips the multi-GB HuggingFace download on startup.
modelCache:
  enabled: true
  size: 20Gi
  existingClaim: whisper-web-gpu-model-cache
  # PodSecurity "restricted" blocks the root chown init container.
  # fsGroup on the NetApp Trident CSI handles ownership on mount.
  fixPermsInitContainer: false

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  runAsGroup: 1000
  fsGroup: 2000
  seccompProfile:
    type: RuntimeDefault

securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL

startupProbe:
  httpGet:
    path: /health/readiness
    port: http
  initialDelaySeconds: 30
  periodSeconds: 15
  timeoutSeconds: 10
  failureThreshold: 80

livenessProbe:
  httpGet:
    path: /health/liveness
    port: http
  initialDelaySeconds: 60
  periodSeconds: 30
  timeoutSeconds: 10
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /health/readiness
    port: http
  initialDelaySeconds: 30
  periodSeconds: 15
  timeoutSeconds: 10
  failureThreshold: 3

resources:
  requests:
    cpu: "2"
    memory: 8Gi
  limits:
    cpu: "6"
    memory: 16Gi

# HPA disabled: model-cache PVC is RWO so a second replica stays Pending
# with Multi-Attach, and a second pod would compete for the same
# time-sliced A40 slot. Raise WHISPER_MAX_WORKERS if more throughput is
# needed.
hpa:
  enabled: false
  minReplicas: 1
  maxReplicas: 1
  targetCPUUtilizationPercentage: 70

sessionAffinity:
  enabled: true
  timeoutSeconds: 10800

# Pin to the A40 time-sliced GPU pool.
nodeSelector:
  nvidia.com/gpu.present: "true"

# GPU nodes carry an nvidia.com/gpu:NoSchedule taint so general workloads
# don't steal the slots — tolerate it.
tolerations:
  - key: nvidia.com/gpu
    operator: Exists
    effect: NoSchedule
affinity: {}
