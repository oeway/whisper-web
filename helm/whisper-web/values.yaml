replicaCount: 1

image:
  repository: ghcr.io/oeway/whisper-web
  tag: "main"
  pullPolicy: Always

service:
  type: ClusterIP
  port: 8000

ingress:
  enabled: true
  className: nginx
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/proxy-body-size: 100m
    # Increase timeouts for long transcription requests (must exceed WHISPER_INFERENCE_TIMEOUT)
    nginx.ingress.kubernetes.io/proxy-read-timeout: "360"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "360"
    nginx.ingress.kubernetes.io/enable-cors: "true"
    nginx.ingress.kubernetes.io/cors-allow-origin: "*"
    nginx.ingress.kubernetes.io/cors-allow-methods: "GET, POST, PUT, DELETE, OPTIONS"
    nginx.ingress.kubernetes.io/cors-allow-headers: "DNT,X-CustomHeader,Keep-Alive,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Authorization"
  host: whisper.hypha.aicell.io
  tls:
    secretName: whisper.hypha.aicell.io-tls

# Whisper model and runtime configuration.
# Recommended compute types by backend:
#   CPU:          int8_float32  (fast, low memory, good accuracy)
#   CUDA GPU:     float16       (fast, requires CUDA 11+)
#   Apple M-chip: mlx-float16   (auto-selected when mlx-whisper is installed)
env:
  WHISPER_MODEL_SIZE: "small"
  WHISPER_DEVICE: "cpu"
  WHISPER_COMPUTE_TYPE: "int8_float32"
  # Number of concurrent inference threads per pod.
  # Rule of thumb: set to half the pod's CPU limit (e.g. 4 CPUs → 2 workers).
  # Automatically capped to 1 when using the MLX/Metal GPU backend.
  WHISPER_MAX_WORKERS: "2"
  # Maximum in-flight requests before 429 is returned (queue = workers × 8 by default).
  # WHISPER_MAX_QUEUE: "16"
  # Per-request inference timeout in seconds.
  # Raised to 300s to support long recordings (~10+ min) on CPU.
  WHISPER_INFERENCE_TIMEOUT: "300"
  # Number of uvicorn worker processes per pod.
  # Increase only if CPU-bound and each worker's RAM cost is acceptable.
  UVICORN_WORKERS: "1"
  WHISPER_REQUIRE_AUTH: "true"
  HYPHA_TOKEN_URL: "https://hypha.aicell.io/public/services/ws/parse_token"

# ── GPU support ──────────────────────────────────────────────────────────────
# Set gpu.enabled=true to request an NVIDIA GPU.
# Also set env.WHISPER_DEVICE=cuda and env.WHISPER_COMPUTE_TYPE=float16.
# The image must be built with the [cuda] extra: pip install ./backend[cuda]
gpu:
  enabled: false
  # resource: nvidia.com/gpu   # or amd.com/gpu
  # count: 1

# ── Model cache PersistentVolumeClaim ────────────────────────────────────────
# Mount a PVC at /data so HuggingFace model files survive pod restarts.
# Without this, each new pod downloads the model from the internet on startup.
modelCache:
  enabled: false
  # storageClassName: standard
  size: 10Gi
  # existingClaim: ""   # reuse an existing PVC instead of creating one

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  runAsGroup: 1000
  fsGroup: 2000
  seccompProfile:
    type: RuntimeDefault

securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL

startupProbe:
  httpGet:
    path: /health/readiness
    port: http
  initialDelaySeconds: 10
  periodSeconds: 10
  timeoutSeconds: 10
  failureThreshold: 60  # up to 10 + 60×10 = 610 s for large model downloads

livenessProbe:
  httpGet:
    path: /health/liveness
    port: http
  initialDelaySeconds: 30
  periodSeconds: 30
  timeoutSeconds: 10
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /health/readiness
    port: http
  initialDelaySeconds: 10
  periodSeconds: 10
  timeoutSeconds: 10
  failureThreshold: 3

# CPU-only defaults. Adjust for GPU nodes: increase memory to 8Gi+.
resources:
  requests:
    cpu: "1"
    memory: 2Gi
  limits:
    cpu: "4"
    memory: 4Gi

# ── Horizontal Pod Autoscaler ─────────────────────────────────────────────────
# Scales pods based on CPU utilization.
# Only effective when the /api/transcribe (stateless) endpoint is used;
# batch-mode sessions require sticky sessions (sessionAffinity: ClientIP).
hpa:
  enabled: false
  minReplicas: 1
  maxReplicas: 5
  targetCPUUtilizationPercentage: 70

# ── Session affinity ──────────────────────────────────────────────────────────
# Required when using the stateful session API (/api/session/…) with >1 replica.
# Not needed when using only /api/transcribe or /api/stream/utterance.
sessionAffinity:
  enabled: false
  # timeoutSeconds: 10800

nodeSelector: {}
tolerations: []
affinity: {}
