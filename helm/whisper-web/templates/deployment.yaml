apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}
  labels:
    app.kubernetes.io/name: {{ .Chart.Name }}
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ .Chart.Name }}
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ .Chart.Name }}
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- if .Values.modelCache.enabled }}
      initContainers:
        - name: fix-model-cache-perms
          image: busybox
          command: ["sh", "-c", "chown -R 1000:2000 /data"]
          volumeMounts:
            - name: model-cache
              mountPath: /data
          securityContext:
            runAsUser: 0
      {{- end }}
      containers:
        - name: {{ .Chart.Name }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
          env:
            {{- range $key, $value := .Values.env }}
            - name: {{ $key }}
              value: {{ $value | quote }}
            {{- end }}
            {{- if .Values.modelCache.enabled }}
            - name: HF_HOME
              value: /data/models
            {{- end }}
          {{- if .Values.modelCache.enabled }}
          volumeMounts:
            - name: model-cache
              mountPath: /data
          {{- end }}
          startupProbe:
            {{- toYaml .Values.startupProbe | nindent 12 }}
          livenessProbe:
            {{- toYaml .Values.livenessProbe | nindent 12 }}
          readinessProbe:
            {{- toYaml .Values.readinessProbe | nindent 12 }}
          resources:
            {{- if .Values.gpu.enabled }}
            requests:
              {{- toYaml .Values.resources.requests | nindent 14 }}
              {{ .Values.gpu.resource | default "nvidia.com/gpu" }}: {{ .Values.gpu.count | default 1 }}
            limits:
              {{- toYaml .Values.resources.limits | nindent 14 }}
              {{ .Values.gpu.resource | default "nvidia.com/gpu" }}: {{ .Values.gpu.count | default 1 }}
            {{- else }}
            {{- toYaml .Values.resources | nindent 12 }}
            {{- end }}
      {{- if .Values.modelCache.enabled }}
      volumes:
        - name: model-cache
          {{- if .Values.modelCache.existingClaim }}
          persistentVolumeClaim:
            claimName: {{ .Values.modelCache.existingClaim }}
          {{- else }}
          persistentVolumeClaim:
            claimName: {{ .Release.Name }}-model-cache
          {{- end }}
      {{- end }}
