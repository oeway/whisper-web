# GPU + whisperX values overlay for the whisper-web chart.
# Deploy alongside the CPU release as a separate Helm release:
#
#   helm upgrade --install whisper-web-gpu ./helm/whisper-web \
#     -n hypha -f ./helm/whisper-web/values-gpu.yaml
#
# Keeps the existing whisper.hypha.aicell.io CPU service untouched and adds
# whisper-gpu.hypha.aicell.io for the GPU/whisperX endpoint used by the Vexa
# meeting bot (OpenAI-compatible /v1/audio/transcriptions).

replicaCount: 1

image:
  repository: ghcr.io/oeway/whisper-web
  tag: "main-gpu"
  pullPolicy: Always

service:
  type: ClusterIP
  port: 8000

ingress:
  enabled: true
  className: nginx
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/proxy-body-size: 100m
    nginx.ingress.kubernetes.io/proxy-read-timeout: "360"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "360"
    nginx.ingress.kubernetes.io/affinity: "cookie"
    nginx.ingress.kubernetes.io/affinity-mode: "persistent"
    nginx.ingress.kubernetes.io/session-cookie-name: "whisper-gpu-sticky"
    nginx.ingress.kubernetes.io/session-cookie-max-age: "10800"
    nginx.ingress.kubernetes.io/session-cookie-samesite: "None"
    nginx.ingress.kubernetes.io/session-cookie-secure: "true"
    nginx.ingress.kubernetes.io/enable-cors: "true"
    nginx.ingress.kubernetes.io/cors-allow-origin: "*"
    nginx.ingress.kubernetes.io/cors-allow-methods: "GET, POST, PUT, DELETE, OPTIONS"
    nginx.ingress.kubernetes.io/cors-allow-headers: "DNT,X-CustomHeader,Keep-Alive,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Authorization"
  host: whisper-gpu.hypha.aicell.io
  tls:
    secretName: whisper-gpu.hypha.aicell.io-tls

env:
  WHISPER_BACKEND: "whisperx"
  WHISPER_MODEL_SIZE: "large-v3"
  WHISPER_DEVICE: "cuda"
  WHISPER_COMPUTE_TYPE: "float16"
  # whisperX is GPU-bound and one inference saturates the slice; keep a small
  # pool so concurrent ~3s bot chunks queue rather than thrash the GPU context.
  WHISPER_MAX_WORKERS: "2"
  WHISPER_MAX_QUEUE: "32"
  # Vexa posts short (~3s) WAVs; cap inference time to fail fast on regressions.
  WHISPER_INFERENCE_TIMEOUT: "120"
  WHISPERX_BATCH_SIZE: "8"
  UVICORN_WORKERS: "1"
  WHISPER_REQUIRE_AUTH: "true"
  HYPHA_TOKEN_URL: "https://hypha.aicell.io/public/services/ws/parse_token"

gpu:
  enabled: true
  resource: nvidia.com/gpu
  count: 1

# Cache the large-v3 weights + the per-language alignment models so pod
# restarts don't re-download 3GB+ from HuggingFace.
modelCache:
  enabled: true
  size: 20Gi
  # Cluster enforces PodSecurity "restricted" → can't run root init container.
  # fsGroup on the NetApp Trident CSI handles ownership on mount.
  fixPermsInitContainer: false

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  runAsGroup: 1000
  fsGroup: 2000
  seccompProfile:
    type: RuntimeDefault

securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL

startupProbe:
  httpGet:
    path: /health/readiness
    port: http
  initialDelaySeconds: 30
  periodSeconds: 15
  timeoutSeconds: 10
  failureThreshold: 80  # up to 30 + 80×15 = 1230 s for first-pod model download

livenessProbe:
  httpGet:
    path: /health/liveness
    port: http
  initialDelaySeconds: 60
  periodSeconds: 30
  timeoutSeconds: 10
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /health/readiness
    port: http
  initialDelaySeconds: 30
  periodSeconds: 15
  timeoutSeconds: 10
  failureThreshold: 3

resources:
  requests:
    cpu: "2"
    memory: 8Gi
  limits:
    cpu: "6"
    memory: 16Gi

# Pin to a single replica. The PVC is RWO so a second pod would stay
# Pending with Multi-Attach. Even with RWX, a second pod competes for the
# same time-sliced A40 slot and adds little throughput — better to raise
# WHISPER_MAX_WORKERS within one pod than scale out.
hpa:
  enabled: false
  minReplicas: 1
  maxReplicas: 1
  targetCPUUtilizationPercentage: 70

sessionAffinity:
  enabled: true
  timeoutSeconds: 10800

# Pin to the A40 time-sliced GPU pool in scilifelab-2-dev.
nodeSelector:
  nvidia.com/gpu.present: "true"

# GPU nodes carry an nvidia.com/gpu:NoSchedule taint so general workloads
# don't steal the slots — tolerate it so we can land there.
tolerations:
  - key: nvidia.com/gpu
    operator: Exists
    effect: NoSchedule
affinity: {}
